<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tap-Tap Boss Fight AR</title>
  <!--<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>-->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════════════════════════════
     HUD
════════════════════════════════ -->
<div id="hud">
  <div id="top-bar">
    <div id="hp-container">
      <div id="hp-label">BOSS HP</div>
      <div id="hp-bar-bg">
        <div id="hp-bar"></div>
      </div>
    </div>
    <div>
      <div id="score-label">SCORE</div>
      <div id="score-display">0</div>
    </div>
  </div>
</div>

<!-- Scan prompt -->
<div id="scan-prompt">
  <span class="scan-icon">⟳</span>
  Apunta el marcador Hiro para invocar al boss
</div>

<!-- Start overlay -->
<div id="overlay">
  <div class="overlay-title">TAP-TAP<br>BOSS</div>
  <div class="overlay-sub">Escanea el marcador con la cámara<br>¡y derrota al enemigo a golpes!</div>
  <button class="btn-play" onclick="startGame()">⚔️ EMPEZAR</button>
</div>

<!-- Result overlay -->
<div id="result-overlay">
  <div class="result-card">

    <!-- Título -->
    <div class="result-title win" id="result-title">¡VICTORIA!</div>

    <!-- Puntuación -->
    <div class="score-block">
      <div class="score-label-sm">Puntuación</div>
      <div class="score-value" id="result-score">0</div>
      <div class="new-best-badge" id="new-best-badge">✦ NUEVO RÉCORD ✦</div>
    </div>

    <!-- Recompensas -->
    <div style="width:100%;display:flex;flex-direction:column;gap:8px;align-items:center;">
      <div class="rewards-title">Recompensas obtenidas</div>
      <div class="rewards-grid" id="rewards-grid"></div>
    </div>

    <div class="divider"></div>

    <!-- Ranking -->
    <div style="width:100%;">
      <div class="lb-header">
        <div class="lb-title">🏆 Ranking</div>
        <button class="lb-clear" onclick="clearLeaderboard()">Borrar</button>
      </div>
      <table class="lb-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Jugador</th>
            <th>Puntos</th>
          </tr>
        </thead>
        <tbody id="cuerpotabla"></tbody>
      </table>
    </div>

    <!-- Botones -->
    <div class="btn-row">
      <button class="btn-play btn-secondary" onclick="shareScore()">📤 Compartir</button>
      <button class="btn-play btn-primary"   onclick="restartGame()">⚔️ Rejugar</button>
    </div>

  </div>
</div>


<!-- ════════════════════════════════
     A-FRAME + AR.JS SCENE
════════════════════════════════ -->
<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: true"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <img id="boss-img"  src="vaia.png">
    <img id="suelo-img" src="suelo.png">
  </a-assets>

  <a-camera psition="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" id="boss-marker">

    <!-- Suelo -->
    <a-plane
      id="arena-floor"
      position="0 0 0"
      width="10"
      height="2.4"
      rotation="-90 0 0"
      material="src: #suelo-img; transparent: true; alphaTest: 0.05">
    </a-plane>

    <!-- Boss -->
    <a-plane
      id="boss-sprite"
      position="0 0.5 -0.6"
      width="1.2"
      height="1.4"
      rotation="-90 0 0"
      material="src: #boss-img; transparent: true; alphaTest: 0.1">
    </a-plane>

    <!-- Texto flotante -->
    <a-text
      id="tap-hint"
      value="¡TOCA LA PANTALLA!"
      align="center"
      color="#ffdd00"
      position="0 1.3 0"
      scale="0.5 0.5 0.5"
      animation="property: position; to: 0 1.4 0; dir: alternate; loop: true; dur: 1000">
    </a-text>
    
  </a-entity>

</a-scene>

<script src="script.js"></script>
</body>
</html>
