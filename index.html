<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tap-Tap Boss Fight AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- AR.js para A-Frame -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="style.css">
  


</head>
<body>

<!-- ════════════════════════════════
     HUD
════════════════════════════════ -->
<div id="hud">
  <div id="top-bar">
    <div id="hp-container">
      <div id="hp-label">BOSS HP</div>
      <div id="hp-bar-bg">
        <div id="hp-bar"></div>
      </div>
    </div>
    <div>
      <div id="score-label">SCORE</div>
      <div id="score-display">0</div>
    </div>
  </div>
</div>

<!-- Scan prompt -->
<div id="scan-prompt">
  <span class="scan-icon">⟳</span>
  Apunta el marcador Hiro para invocar al boss
</div>

<!-- Start overlay -->
<div id="overlay">
  <div class="overlay-title">TAP-TAP<br>BOSS</div>
  <div class="overlay-sub">Escanea el marcador con la cámara<br>¡y derrota al enemigo a golpes!</div>
  <button class="btn-play" onclick="startGame()">⚔️ EMPEZAR</button>
</div>

<!-- Result overlay -->
<div id="result-overlay">
  <div class="result-title" id="result-title">¡VICTORIA!</div>
  <div class="result-score" id="result-score">Puntuación: 0</div>
  <button class="btn-play" onclick="restartGame()">🔄 VOLVER A JUGAR</button>
</div>


<!-- ════════════════════════════════
     A-FRAME + AR.JS SCENE
════════════════════════════════ -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="antialias: true; alpha: true;"
  vr-mode-ui="enabled: false"
  id="ar-scene"
  style="position:fixed;top:0;left:0;width:100%;height:100%;">

  <a-assets>
    <img id="boss-img" src="vaia.png">
    <img id="suelo-img" src="suelo.png">
  </a-assets>

  <!-- Marker Hiro (el marcador estándar de AR.js, puedes imprimir el tuyo) -->
  <a-marker preset="hiro" id="boss-marker" smooth="true" smoothCount="5">

    <!-- ─── ESCENARIO BASE ─── -->
    <!-- Suelo / arena de combate -->
    <a-plane
      id="arena-floor"
      position="0 0 0"
      width="3.4"
      height="3.4"
      rotation="-90 0 0"
      material="src: #suelo-img; transparent: true; alphaTest: 0.05">
    </a-plane>

    <!-- ─── BOSS (vaia) ─── -->
    <a-plane
      id="boss-sprite"  
      position="0 0.6 0"
      width="1.2"
      height="1.4"
      rotation="-90 0 0"
      material="src: #boss-img; transparent: true; alphaTest: 0.1"
      look-at="[camera]"
    ></a-plane>

    <!-- Texto "TAP TO HIT" flotante -->
    <a-text
      id="tap-hint"
      value="¡TOCA LA PANTALLA!"
      align="center"
      color="#ffdd00"
      position="0 1.3 0"
      scale="0.5 0.5 0.5"
      animation="property: position; to: 0 1.4 0; dir: alternate; loop: true; dur: 1000"
    ></a-text>

    <!-- Barra de vida 3D sobre el boss -->
    <a-entity position="0 1.15 0">
      <a-box width="0.8" height="0.07" depth="0.01" color="#333" position="0 0 0"></a-box>
      <a-box id="hp-bar-3d" width="0.8" height="0.07" depth="0.015" color="#ff3300" position="0 0 0.005"></a-box>
    </a-entity>

  </a-marker><!-- /boss-marker -->

  <!-- Cámara -->
  <a-entity camera></a-entity>

</a-scene>
<script src="script.js"></script>
</body>
</html>
