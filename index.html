<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Boss Fight WebXR</title>

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-family: Arial;
      z-index: 10;
    }

    #vidaBar {
      width: 200px;
      height: 20px;
      background: red;
      border: 2px solid white;
    }

    #vida {
      width: 100%;
      height: 100%;
      background: lime;
    }

    #startBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="ui">
  Boss HP
  <div id="vidaBar"><div id="vida"></div></div>
</div>

<button id="startBtn">INICIAR AR</button>

<a-scene
  xr-mode-ui="enabled: true"
  webxr="requiredFeatures: hit-test, local-floor"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false">

  <a-camera position="0 1.6 0"></a-camera>

  <!-- Boss -->
  <a-entity id="boss" visible="false">
    <a-image 
      src="vaia.png"
      width="1"
      height="1"
      position="0 0.5 0">
    </a-image>
  </a-entity>

</a-scene>

<script>
let boss = document.querySelector("#boss");
let vida = 10;
let maxVida = 10;
let barra = document.querySelector("#vida");

let placed = false;

document.querySelector("#startBtn").addEventListener("click", async () => {
  const scene = document.querySelector("a-scene");

  if (scene.renderer.xr) {
    scene.renderer.xr.enabled = true;
    await scene.renderer.xr.setReferenceSpaceType('local-floor');
    scene.enterAR();
  }
});

// Detectar suelo y colocar boss
AFRAME.registerComponent('tap-place', {
  init: function () {
    const scene = this.el.sceneEl;

    scene.addEventListener('click', (e) => {

      if (placed) return;

      let camera = scene.camera;
      let direction = new THREE.Vector3();
      camera.getWorldDirection(direction);

      let position = camera.position.clone().add(direction.multiplyScalar(2));

      boss.setAttribute("position", position);
      boss.setAttribute("visible", true);

      placed = true;
    });
  }
});

document.querySelector("a-scene").setAttribute("tap-place", "");

// ATAQUE
boss.addEventListener("click", () => {

  if (vida <= 0) return;

  vida--;

  let porcentaje = (vida / maxVida) * 100;
  barra.style.width = porcentaje + "%";

  if (vida <= 0) {
    boss.setAttribute("visible", false);
    alert("¡BOSS DERROTADO!");
  }

});
</script>

</body>
</html>
