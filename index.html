<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spores and Dreams</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <link rel="stylesheet" href="asset/css/style.css">
  <link rel="icon" type="image/png" href="asset/imagen/LogoSETAvector.svg">
  
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/eruda@3/eruda.min.js"></script>
<script>eruda.init();</script>
<!-- ════════════════════════════════
     HUD
════════════════════════════════ -->
<div id="hud">
  <!-- Score + Combo centrado -->
  <div id="score-row">
    <div id="score-label">Score</div>
    <div id="score-display">0</div>
    <div id="combo-display">x1</div>
  </div>

  <!-- Multiplier debajo del score -->
  <div id="multiplier-display">×1 PTS</div>

  <!-- Barras de vida lado a lado -->
  <div id="bars-row">
    <div class="bar-group bar-player">
      <div class="bar-header">
        <div class="bar-label" id="player-hp-label">Tu vida</div>
        <div class="bar-count" id="player-hp-count">5/5</div>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" id="player-hp-bar"></div>
      </div>
    </div>

    <div class="bar-separator"></div>

    <div class="bar-group bar-boss">
      <div class="bar-header">
        <div class="bar-label" id="hp-label">Boss</div>
        <div class="bar-count" id="boss-hp-count">20/20</div>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" id="hp-bar"></div>
      </div>
    </div>
  </div>

  <div id="hud-divider"></div>
</div>

<!-- Scan prompt -->
<div id="scan-prompt">
  <span class="scan-dot"></span>
  Apunta al marcador
</div>

<!-- Start overlay -->
<div id="overlay">
  <div class="overlay-inner">
    <div class="overlay-glow"></div>
    <div class="overlay-line-top"></div>

    <div class="overlay-tag">Realidad aumentada</div>

    <div class="overlay-title-group">
      <div class="overlay-title">Spores</div>
      <div class="overlay-title">and</div>
      <div class="overlay-title">Dreams</div>
    </div>

    <div class="overlay-boss-label">BOSS</div>

    <div class="overlay-sub">Escanea el marcador<br>Derrota al enemigo</div>

    <button class="btn-start" onclick="startGame()">EMPEZAR</button>

    <div class="overlay-line-bottom"></div>
  </div>
</div>

<!-- Result overlay -->
<div id="result-overlay">
  <div class="result-card">

    <!-- Título -->
    <div class="result-title win" id="result-title">¡VICTORIA!</div>

    <!-- Puntuación -->
    <div class="score-block">
      <div class="score-label-sm">Puntuación</div>
      <div class="score-value" id="result-score">0</div>
      <div class="new-best-badge" id="new-best-badge">✦ NUEVO RÉCORD ✦</div>
    </div>

    <!-- Recompensas -->
    <div style="width:100%;display:flex;flex-direction:column;gap:8px;align-items:center;">
      <div class="rewards-title">Recompensas obtenidas</div>
      <div class="rewards-grid" id="rewards-grid"></div>
    </div>

    <div class="divider"></div>

    <!-- Ranking -->
    <div style="width:100%;">
      <div class="lb-header">
        <div class="lb-title">🏆 Ranking</div>
        <button class="lb-clear" onclick="clearLeaderboard()">Borrar</button>
      </div>
      <table class="lb-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Jugador</th>
            <th>Puntos</th>
          </tr>
        </thead>
        <tbody id="cuerpotabla"></tbody>
      </table>
    </div>

    <!-- Botones -->
    <div class="btn-row">
      <button class="btn-play btn-secondary" onclick="shareScore()">📤 Compartir</button>
      <button class="btn-play btn-primary"   onclick="restartGame()">⚔️ Rejugar</button>
      <a href="links/index.html" class="btn-play btn-secondary" style="text-align: center; text-decoration: none; display: block; width: 100%;">🔗 Síguenos</a>
    </div>

  </div>
</div>


<!-- ════════════════════════════════
     A-FRAME + AR.JS SCENE
════════════════════════════════ -->
<a-scene
  mindar-image="imageTargetSrc: asset/targets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
  id="ar-scene">

  <a-assets>
    <img id="boss-img"  src="asset/imagen/vaia.png">
    <img id="suelo-img" src="asset/imagen/suelo.png">
  </a-assets>

  <!-- Cámara MindAR -->
  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
    cursor="fuse: false; rayOrigin: mouse;"
    raycaster="near: 10; far: 10000; objects: .clickable">
  </a-camera>

  <!-- Entidad de tracking de imagen (reemplaza a <a-marker>) -->
  <a-entity id="boss-marker" mindar-image-target="targetIndex: 0">

    <!-- Suelo -->
    <a-plane
      id="arena-floor"
      position="0 0 0"
      width="2"
      height="0.48"
      rotation="0 0 0"
      material="src: #suelo-img; transparent: true; alphaTest: 0.05">
    </a-plane>

    <!-- Boss -->
    <a-plane
      id="boss-sprite"
      position="0 0 0.1"
      width="0.6"
      height="0.7"
      rotation="0 0 0"
      material="src: #boss-img; transparent: true; alphaTest: 0.1">
    </a-plane>

    <!-- Texto flotante -->
    <a-text
      id="tap-hint"
      value="¡TOCA LA PANTALLA!"
      align="center"
      color="#ffdd00"
      position="0 0.4 0.1"
      scale="0.25 0.25 0.25"
      animation="property: position; to: 0 0.45 0.1; dir: alternate; loop: true; dur: 1000">
    </a-text>

  </a-entity>

</a-scene>

<script type="module" src="asset/javascript/script.js"></script>
</body>
</html>
