<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Boss Fight WebXR</title>

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-family: Arial;
      z-index: 10;
    }

    #vidaBar {
      width: 200px;
      height: 20px;
      background: red;
      border: 2px solid white;
    }

    #vida {
      width: 100%;
      height: 100%;
      background: lime;
    }

    #startBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="ui">
  Boss HP
  <div id="vidaBar"><div id="vida"></div></div>
</div>

<button id="startBtn">INICIAR AR</button>

<a-scene
  xr-mode-ui="enabled: true"
  webxr="requiredFeatures: hit-test, local-floor"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false">

  <a-camera position="0 1.6 0"></a-camera>

  <!-- Boss -->
  <a-entity id="boss" visible="false">
    <a-image 
      src="vaia.png"
      width="1"
      height="1"
      position="0 0.5 0">
    </a-image>
    <a-ring radius-inner="0.2" radius-outer="0.25" rotation="-90 0 0" color="yellow"></a-ring>
  </a-entity>

</a-scene>

<script>
let boss = document.querySelector("#boss");
let vida = 10;
let maxVida = 10;
let barra = document.querySelector("#vida");

let placed = false;
let xrSession = null;
let hitTestSource = null;
let referenceSpace = null;

// BOTÓN AR
document.querySelector("#startBtn").addEventListener("click", async () => {
  const scene = document.querySelector("a-scene");

  await scene.enterAR();

  xrSession = scene.renderer.xr.getSession();

  referenceSpace = await xrSession.requestReferenceSpace("viewer");
  const viewerSpace = await xrSession.requestReferenceSpace("viewer");

  hitTestSource = await xrSession.requestHitTestSource({
    space: viewerSpace
  });

});

// LOOP DE HIT TEST
AFRAME.scenes[0].renderer.setAnimationLoop((timestamp, frame) => {
  if (!frame || !hitTestSource) return;

  const hitTestResults = frame.getHitTestResults(hitTestSource);

  if (hitTestResults.length > 0 && !placed) {
    const hit = hitTestResults[0];
    const pose = hit.getPose(AFRAME.scenes[0].renderer.xr.getReferenceSpace());

    if (pose) {
      const pos = pose.transform.position;

      boss.setAttribute("position", `${pos.x} ${pos.y} ${pos.z}`);
    }
  }
});

// TAP PARA FIJAR
window.addEventListener("click", () => {
  if (!placed && boss.getAttribute("position")) {
    boss.setAttribute("visible", true);
    placed = true;
  }
});

// ATAQUE
boss.addEventListener("click", () => {

  if (vida <= 0) return;

  vida--;

  let porcentaje = (vida / maxVida) * 100;
  barra.style.width = porcentaje + "%";

  if (vida <= 0) {
    boss.setAttribute("visible", false);
    alert("¡BOSS DERROTADO!");
  }

});
</script>

</body>
</html>
