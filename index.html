<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- Mind AR World Tracking -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-world-aframe.prod.js"></script>

</head>
<body>
  <!-- escena AR-->
  <a-scene id="ar-scene"
    mindar-world="filterMinCF:0.001; filterBeta:0.01; uiScanning:·scanning-overlay"
    renderer="colorManagement: truen; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    style="display: none;"
  ></a-scene>

  <a-camera id="main-camera" position="0 0 0" look-controls="false">
    <a-entity id="reticle-entity"
    geometry="primitive: ring; radiusInner: 0.04; radiusOuter: 0.05"
    material="color: #00e5ff; opacity: 0.8; shader:flat"
    position="0 0 -0.5"
    rotation="-90 0 0"
    visible="false"
    ></a-entity>
  </a-camera>

  <!-- lo anclamos al mundo -->
   <a-entity id="world-anchor" mindar-world-target visible="false">
    
   </a-entity>


</body>
</html>
