<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Prueba AR</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  </head>
  <body>
   
   <a-scene xr-mode-ui="enabled: true; XRMode: xr;">
      <a-assets timeout="30000">
        <img id="pj" src="vaia.png">
      </a-assets>
    
      <!-- Camera with child image so it stays centered in front of the user -->
      <a-camera id="camera" position="0 0 0" raycaster="objects: .ar-floor" cursor="rayOrigin:">
        <!-- image always 3 units ahead of the camera, will follow the camera movement -->    
        <!-- 2D environment omitted for simplicity -->
        <a-image
          id="marker"
          class="ar-floor"
          src="#pj"
          position="0 0 -3"
          width="1.5"
          height="1.5"
          visible="false">          
        </a-image>
      </a-camera>
      <script>
        const scene = document.querySelector('a-scene');
        const marker = document.querySelector('marker');

        // al hacer click/tocar en el vídeo AR
        scene.addEventListener('click', function (evt) {
          const inter = evt.detail && evt.detail.intersection;
          if (inter && inter.point) {
            // mueve la imagen al punto dectectado y muestra la imagen
            marker.setAttribute('position', inter.point);
            marker.setAttribute('visible', 'true');
          }
        })
      </script>
      <!-- 2D environment omitted for simplicity -->
      <!-- Lights configuration omitted for simplicity -->
    </a-scene>

  </body>
</html>
